<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Vũ Trụ Song Song Của Em 💌</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Be Vietnam Pro',sans-serif;
      background:#0e0f1c;
      overflow:hidden;
      color:white;
      height:100vh;
    }

    .background{
      position:fixed;
      inset:0;
      z-index:-5;

      background:
      radial-gradient(circle at top,#2a2d63 0%,#0c0d18 65%);

      transition:1s ease;
    }

    .background.AAA{
      background:
      radial-gradient(circle at top,#6a11cb 0%,#1a0325 70%);
    }

    .background.AAB{
      background:
      radial-gradient(circle at top,#ff758c 0%,#243b55 70%);
    }

    .background.ABA{
      background:
      radial-gradient(circle at top,#ffb199 0%,#1f2233 70%);
    }

    .background.ABB{
      background:
      radial-gradient(circle at top,#ffe29f 0%,#3d3a4d 70%);
    }

    .background.BAA{
      background:
      radial-gradient(circle at top,#ff4e88 0%,#2a1025 70%);
    }

    .background.BAB{
      background:
      radial-gradient(circle at top,#ffc3a0 0%,#2e3245 70%);
    }

    .background.BBA{
      background:
      radial-gradient(circle at top,#89f7fe 0%,#293848 70%);
    }

    .background.BBB{
      background:
      radial-gradient(circle at top,#f6d365 0%,#4d3d2f 70%);
    }

    .stars{
      position:fixed;
      inset:0;

      background-image:
      radial-gradient(white 1px, transparent 1px);

      background-size:40px 40px;

      opacity:0.1;

      animation:starsMove 90s linear infinite;

      z-index:-4;
    }

    @keyframes starsMove{
      from{
        transform:translateY(0);
      }

      to{
        transform:translateY(-300px);
      }
    }

    /* HEARTS + SPARKLES */

    .decor{
      position:fixed;
      font-size:22px;
      opacity:0.18;
      pointer-events:none;
      animation:floatDecor linear infinite;
    }

    .decor1{
      left:10%;
      top:110%;
      animation-duration:14s;
    }

    .decor2{
      left:25%;
      top:120%;
      animation-duration:18s;
    }

    .decor3{
      left:50%;
      top:115%;
      animation-duration:16s;
    }

    .decor4{
      left:70%;
      top:120%;
      animation-duration:20s;
    }

    .decor5{
      left:85%;
      top:110%;
      animation-duration:15s;
    }

    @keyframes floatDecor{

      from{
        transform:translateY(0) rotate(0deg);
        opacity:0;
      }

      20%{
        opacity:.2;
      }

      to{
        transform:translateY(-130vh) rotate(360deg);
        opacity:0;
      }
    }

    /* PHOTOS */

    .photo{
      position:fixed;
      width:130px;
      height:180px;
      object-fit:cover;

      border-radius:20px;

      box-shadow:0 20px 40px rgba(0,0,0,.35);

      opacity:0.9;

      animation:float 6s ease-in-out infinite;

      z-index:-1;
    }

    .photo1{
      top:6%;
      left:5%;
      transform:rotate(-8deg);
    }

    .photo2{
      bottom:8%;
      left:8%;
      transform:rotate(7deg);
      animation-delay:1s;
    }

    .photo3{
      top:10%;
      right:7%;
      transform:rotate(8deg);
      animation-delay:2s;
    }

    .photo4{
      bottom:7%;
      right:6%;
      transform:rotate(-6deg);
      animation-delay:3s;
    }

    @keyframes float{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-14px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    /* MAIN */

    .container{
      width:100%;
      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:30px;
    }

    .card{
      width:100%;
      max-width:950px;

      background:rgba(255,255,255,0.08);

      border:1px solid rgba(255,255,255,0.1);

      backdrop-filter:blur(16px);

      border-radius:34px;

      padding:55px;

      text-align:center;

      animation:fadeIn .7s ease;
    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(30px) scale(.97);
        filter:blur(10px);
      }

      to{
        opacity:1;
        transform:translateY(0px) scale(1);
        filter:blur(0px);
      }
    }

    h1{
      font-size:54px;
      margin-bottom:22px;
      line-height:1.2;
    }

    h2{
      font-size:34px;
      margin-bottom:40px;
      line-height:1.4;
    }

    p{
      color:#ececf2;
      font-size:18px;
      line-height:1.9;
      margin-bottom:15px;
    }

    /* OPTIONS */

    .options{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
      margin-top:25px;
    }

    .option-btn{

      background:rgba(255,255,255,0.08);

      border:1px solid rgba(255,255,255,.1);

      border-radius:28px;

      padding:32px;

      text-align:left;

      cursor:pointer;

      transition:.35s ease;

      color:white;

      min-height:240px;

      position:relative;

      overflow:hidden;
    }

    .option-btn:hover{

      transform:translateY(-8px) scale(1.02);

      background:rgba(255,255,255,0.13);

      box-shadow:0 20px 40px rgba(0,0,0,.35);
    }

    .option-btn::before{

      content:'';

      position:absolute;
      inset:0;

      background:
      linear-gradient(
      135deg,
      rgba(255,255,255,.08),
      transparent
      );
    }

    .option-title{
      font-size:28px;
      font-weight:700;
      margin-bottom:18px;
      line-height:1.4;
    }

    .option-sub{
      color:#dddded;
      line-height:1.8;
      font-size:16px;
    }

    /* BUTTONS */

    .main-btn{

      margin-top:28px;

      background:white;

      color:black;

      border:none;

      padding:18px 34px;

      border-radius:999px;

      cursor:pointer;

      font-size:16px;

      font-weight:700;

      transition:.3s ease;
    }

    .main-btn:hover{
      transform:scale(1.05);
    }

    .music-btn{

      position:fixed;

      top:20px;
      right:20px;

      z-index:20;

      border:none;

      background:rgba(255,255,255,.12);

      color:white;

      backdrop-filter:blur(10px);

      padding:14px 18px;

      border-radius:999px;

      cursor:pointer;
    }

    .footer{

      margin-top:34px;

      opacity:.85;

      line-height:1.9;
    }

    /* MOBILE */

    @media(max-width:850px){

      body{
        overflow:auto;
      }

      .options{
        grid-template-columns:1fr;
      }

      .card{
        padding:32px;
      }

      .option-btn{
        min-height:auto;
      }

      h1{
        font-size:38px;
      }

      h2{
        font-size:28px;
      }

      .photo{
        width:80px;
        height:110px;
      }
    }

  </style>
</head>

<body>

  <!-- MUSIC -->
  <audio autoplay loop id="bgm">
    <source src="lofi.mp3" type="audio/mpeg">
  </audio>

  <button class="music-btn" onclick="toggleMusic()">
    🎵
  </button>

  <!-- BACKGROUND -->
  <div class="background" id="background"></div>
  <div class="stars"></div>

  <!-- FLOATING EMOJIS -->
  <div class="decor decor1">💖</div>
  <div class="decor decor2">✨</div>
  <div class="decor decor3">💖</div>
  <div class="decor decor4">✨</div>
  <div class="decor decor5">💖</div>

  <!-- PHOTOS -->
  <img src="11.JPG" class="photo photo1">
  <img src="12.jpeg" class="photo photo2">
  <img src="13.jpeg" class="photo photo3">
  <img src="14.jpeg" class="photo photo4">

  <!-- MAIN -->
  <div class="container">
    <div class="card" id="app"></div>
  </div>

  <script>

    const app = document.getElementById("app");
    const background = document.getElementById("background");

    let path = "";

    const questions = {

      start:{
        title:"Vũ Trụ Song Song Của Em 💌",

        text:`
        <p>Sau 1 năm yêu nhau,<br>
        anh nhận ra em không phải người bình thường.</p>

        <p>Vì vậy bài kiểm tra này được tạo ra<br>
        để xác định em là kiểu người yêu gì trong vũ trụ của anh.</p>
        `
      },

      q1:{
        question:"Cuối cùng cũng có một ngày rảnh đi chơi với nhau. Em muốn:",

        options:[

          {
            title:"Đi đâu đó thật random",
            sub:"Chạy xe lòng vòng, ăn linh tinh, nghe nhạc, kiểu “đi đại đi”.",
            value:"A"
          },

          {
            title:"Ở cạnh nhau chill chill",
            sub:"Nằm điều hòa, coi phim, ăn đồ ăn vặt.",
            value:"B"
          }
        ]
      },

      A:{
        question:"Trong lúc đi chơi, em sẽ kiểu:",

        options:[

          {
            title:"Tạo nghiệp cho vui",
            sub:"Chọc anh, kiếm chuyện vô tri.",
            value:"A"
          },

          {
            title:"Biến mọi thứ thành kỷ niệm",
            sub:"Chụp hình, quay video, nhớ từng khoảnh khắc.",
            value:"B"
          }
        ]
      },

      B:{
        question:"Mình được ở cạnh nhau cả ngày, em sẽ muốn được:",

        options:[

          {
            title:"Cưng chiều như em bé",
            sub:"“Anh không thương em nữa hả?”",
            value:"A"
          },

          {
            title:"Chữa lành Ben Béo",
            sub:"Ngồi nghe anh than về cuộc đời.",
            value:"B"
          }
        ]
      }

    };

    const thirdRound = {

      "AA":{
        question:"Tụi mình bị lạc lúc 11h đêm. Em sẽ:",

        options:[

          {
            title:"Tự tin dẫn đường dù không biết đang đi đâu",
            value:"A"
          },

          {
            title:"Bình tĩnh đổ lỗi cho anh",
            value:"B"
          }
        ]
      },

      "AB":{
        question:"Điều quan trọng nhất của một chuyến đi là:",

        options:[

          {
            title:"Khoảnh khắc lúc chúng mình bên nhau",
            value:"A"
          },

          {
            title:"Story đăng lên cho MXH sau chuyến đi",
            value:"B"
          }
        ]
      },

      "BA":{
        question:"Chúng mình sẽ:",

        options:[

          {
            title:"Ôm ôm dính dính, xem phim/tiktok/shopping online",
            value:"A"
          },

          {
            title:"Chơi trò chơi/board game và gossip về mọi người hay đời",
            value:"B"
          }
        ]
      },

      "BB":{
        question:"Tự dưng Ben Béo nổi nóng:",

        options:[

          {
            title:"Dỗ Ben, ôm Ben, dặn dò Ben phải bình tĩnh",
            value:"A"
          },

          {
            title:"Đánh bốp Ben và đuổi ra phòng khách nằm",
            value:"B"
          }
        ]
      }

    };

    const endings = {

      "AAA":{
        title:"Hệ Couple Báo Đời 💥",

        text:`
        <p>Hai đứa là kiểu:</p>

        <p>đi chơi không cần plan,<br>
        bị lạc vẫn rất tự tin,<br>
        và luôn tạo ra vấn đề mới mỗi 15 phút.</p>

        <p>Nhưng kỳ lạ là đi với nhau lúc nào cũng vui.</p>

        <p>Kiểu couple mà người khác nhìn vào sẽ nói:
        “Hai đứa này tồn tại bằng cách nào vậy?”</p>
        `
      },

      "AAB":{
        title:"Cặp Đôi Toxic Nhưng Đáng Yêu 😭",

        text:`
        <p>Em là kiểu người:</p>

        <p>gây chuyện trước,<br>
        đổ lỗi sau,<br>
        rồi cười như chưa có gì xảy ra.</p>

        <p>Còn Ben Béo kiểu gì cũng hết giận được.</p>

        <p>Mối quan hệ này hoạt động bằng:
        sự nhây + tình yêu + khả năng chịu đựng.</p>
        `
      },

      "ABA":{
        title:"Thanh Xuân Điện Ảnh 🎬",

        text:`
        <p>Hai đứa là kiểu:</p>

        <p>đi đâu không quan trọng,<br>
        miễn là được ở cạnh nhau.</p>

        <p>Những khoảnh khắc nhỏ như:
        ngồi xe,
        ăn vặt,
        nghe nhạc,
        nhìn nhau cười...</p>

        <p>đều thành ký ức khó quên.</p>
        `
      },

      "ABB":{
        title:"Cặp Đôi Sống Ảo Chuyên Nghiệp 📸",

        text:`
        <p>Đi chơi là phụ.</p>

        <p>Story Instagram mới là chính.</p>

        <p>Hai đứa kiểu:</p>

        <p>“Khoan ăn.”<br>
        “Để chụp trước.”</p>

        <p>Nhưng nhờ vậy mà tình yêu của tụi mình
        luôn có thật nhiều kỷ niệm để nhìn lại ✨</p>
        `
      },

      "BAA":{
        title:"Em Bé Dính Người 🧸",

        text:`
        <p>Love language của em là:</p>

        <p>ôm ôm,<br>
        dính dính,<br>
        nằm cạnh nhau cả ngày.</p>

        <p>Hai đứa chỉ cần:
        TikTok,
        đồ ăn,
        chăn mềm,
        và nhau là đủ vui rồi.</p>
        `
      },

      "BAB":{
        title:"Couple Hệ Gossip ☕",

        text:`
        <p>Hai đứa thuộc hệ:</p>

        <p>ở nhà,
        chơi game,
        rồi ngồi gossip đủ thứ trên đời.</p>

        <p>Kiểu relationship mà:</p>

        <p>“Ê kể m nghe cái này...”</p>

        <p>là có thể nói liên tục 3 tiếng.</p>
        `
      },

      "BBA":{
        title:"Người Yêu Chữa Lành 💖",

        text:`
        <p>Dù Ben Béo nổi nóng hay stress,</p>

        <p>em vẫn là người:
        ôm Ben,
        dỗ Ben,
        và kéo Ben về trạng thái bình thường.</p>

        <p>Kiểu người yêu khiến cuộc sống cảm thấy nhẹ hơn rất nhiều.</p>
        `
      },

      "BBB":{
        title:"Nóc Nhà Chính Hiệu 👑",

        text:`
        <p>Em không chữa lành.</p>

        <p>Em dùng bạo lực 😭</p>

        <p>Nhưng thật ra:</p>

        <p>đó là kiểu yêu của người quá quen thuộc với nhau.</p>

        <p>Không cần hoàn hảo.
        Không cần nhẹ nhàng mọi lúc.</p>

        <p>Chỉ cần vẫn ở đây với nhau là được ✨</p>
        `
      }

    };

    function renderStart(){

      app.innerHTML = `

      <h1>${questions.start.title}</h1>

      ${questions.start.text}

      <button class="main-btn"
      onclick="renderQuestion1()">

        Bắt đầu định mệnh

      </button>
      `;
    }

    function renderQuestion1(){

      renderQuestion(questions.q1, "chooseFirst");
    }

    function renderQuestion(data, nextFunction){

      app.innerHTML = `

      <h2>${data.question}</h2>

      <div class="options">

        ${data.options.map(option => `

          <button class="option-btn"
          onclick="${nextFunction}('${option.value}')">

            <div class="option-title">
              ${option.title}
            </div>

            <div class="option-sub">
              ${option.sub || ""}
            </div>

          </button>

        `).join("")}

      </div>
      `;
    }

    function chooseFirst(choice){

      path += choice;

      renderQuestion(questions[choice], "chooseSecond");
    }

    function chooseSecond(choice){

      path += choice;

      renderQuestion(thirdRound[path], "showEnding");
    }

    function showEnding(choice){

      path += choice;

      const ending = endings[path];

      background.className = "background " + path;

      app.innerHTML = `

      <div class="ending">

        <h1>${ending.title}</h1>

        ${ending.text}

        <div class="footer">

          “Dù kết quả là gì,<br>
          sau 1 năm,<br>
          anh vẫn sẽ chọn yêu em thêm một lần nữa.” 💌

        </div>

        <button class="main-btn"
        onclick="restartGame()">

          Chơi lại

        </button>

      </div>
      `;
    }

    function restartGame(){

      path = "";

      background.className = "background";

      renderStart();
    }

    function toggleMusic(){

      const music = document.getElementById("bgm");

      if(music.paused){

        music.play();

      }else{

        music.pause();
      }
    }

    renderStart();

  </script>

</body>
</html>
